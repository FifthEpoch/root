<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Computer Lab — Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="loading-overlay">
    <video id="landing-video" muted playsinline preload="auto"
           src="https://pub-c13cdb673b934fa282c9bb3c6f22046e.r2.dev/landing/video/1080p-4A3AC581-3F7D-4026-AC08-6B834E735C6F.mov"></video>
    <div class="landing-vignette"></div>
    <div class="landing-content">
      <p class="landing-bio">Wun Ting Chan is a NYC-based computer scientist and artist from Hong Kong.</p>
      <button id="enter-btn" class="loading" disabled>
        <span class="btn-spinner"></span>
        <span class="btn-text">Enter My Lab</span>
      </button>
    </div>
  </div>
  <canvas id="scene-canvas"></canvas>
  <div id="mobile-reticle" class="hidden">
    <svg width="60" height="60" viewBox="0 0 60 60">
      <circle cx="30" cy="30" r="14" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
      <circle cx="30" cy="30" r="22" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.75"/>
    </svg>
  </div>
  <div id="controls-hint">
    <p class="hint-desktop"><kbd>&uarr;&darr;</kbd> walk &middot; <kbd>&larr;&rarr;</kbd> turn &middot; drag to look &middot; scroll to zoom</p>
    <p class="hint-mobile">slide up/down to walk &middot; slide left/right to turn &middot; tap to interact</p>
  </div>
  <video id="projector-video" src="media/vid/projector.mp4" loop muted playsinline preload="auto" style="display:none"></video>
  <div id="lab-ui">
    <a id="cv-link" href="#">ting's CV 👀</a>
    <button id="gyro-toggle" type="button" title="Toggle gyroscope" aria-label="Toggle gyroscope" style="display:none">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><ellipse cx="12" cy="12" rx="10" ry="4"/><ellipse cx="12" cy="12" rx="4" ry="10"/></svg>
    </button>
    <button id="sound-toggle" type="button" title="Toggle sound" aria-label="Toggle sound">
      <svg id="sound-on-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      <svg id="sound-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
    </button>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
